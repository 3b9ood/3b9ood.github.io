<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>سين جيم الغلابة</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    /* للهواتف فقط */
@media (max-width: 768px) {
    #gameContainer {
        gap: 100px;
    }
    
    .game-row {
        row-gap: 100px;
    }
}
/* للهواتف في الوضع الأفقي (قلب الهاتف) */
@media (orientation: landscape) and (max-height: 500px) {
    #gameContainer {
        column-gap: 150px !important;
        padding: 0 50px !important;
    }
    .game-row {
        margin-left: 30px !important;
    }
}
body{
    font-family:Arial;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364,#1f4037);
    color:white;
    text-align:center;
    margin:0;
}

h1,h2{padding:15px}
button{padding:10px 15px;margin:5px;border-radius:12px;border:none;cursor:pointer;font-weight:bold;transition:.2s}
button:hover{transform:scale(1.05)}

#playerNames{display:flex;flex-direction:column;align-items:center;margin-top:50px}
#playerNames input{padding:12px;margin:10px;font-size:16px;width:220px;border-radius:10px;border:none}

#scoreboard{
    display:flex;
    justify-content:space-around;
    margin:20px;
    display:none;
}
.player{
    font-size:20px;
    padding:15px 25px;
    border-radius:15px;
    background:linear-gradient(145deg,#1e1e1e,#333);
    box-shadow:0 0 15px rgba(0,0,0,.6);
}

#gameTurn{
    font-size:22px;
    color:#00ffd5;
    text-shadow:0 0 10px #00ffd5;
}

.container{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;margin-top:20px}

/* اختيار الفئات */
.card{
    width:150px;          
    height:180px;
    background:linear-gradient(160deg,#1c1c1c,#2b2b2b);
    border-radius:20px;
    padding:10px;
    cursor:pointer;
    transition:.3s;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    box-shadow:0 5px 20px rgba(0,0,0,.6);
}
.card:hover {
    transform: scale(1.1);
    box-shadow: 0 10px 25px rgba(0,0,0,0.8);
    transition: transform 0.3s, box-shadow 0.3s;
}
.card img{
    width:100%;
    height: 170px;
    border-radius:15px;
    object-fit:cover;
}
.card label{
    margin-bottom:10px;
    font-size:16px;
    color:gold;
    text-align:center;
}
.card.selected{outline:3px solid lime}

/* زر التالي */
#nextBtn{
    padding:8px 16px;
    font-size:16px;
    border-radius:12px;
    background:linear-gradient(145deg,#00c6ff,#0072ff);
    color:white;
    cursor:pointer;
}

/* شاشة اللعبة */
#gameScreen{display:none;margin-top:20px;position:relative}

#backBtn, #changePlayersBtn{
    position:absolute;
    top:10px;
    left:10px;
    background:linear-gradient(145deg,#ff416c,#ff4b2b);
    color:white;
    padding:8px 16px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(255,65,108,.7);
}
#changePlayersBtn{left:160px;}

#gameContainer{
    display:grid;
    grid-template-columns:repeat(3, 1fr); /* 3 فئات في الصف */
    gap:30px;
    padding:60px;
    padding-left: 150px;
}

/* كل فئة داخل اللعبة */
.game-row{
    width:50%;
    height:250px;
    position:relative;
    background:rgba(0,0,0,.5);
    border-radius:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:10px;
    transition:.3s;
}
.game-row img{
    width:80%;
    height:240px;       
    border-radius:10px;
    object-fit:cover; /* الصورة تناسب الفئة */
}
.category-name{
    margin-bottom:8px;
    font-size:20px;
    color:gold;
    text-align:center;
}
#callPopup{
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    border-radius:15px;
    display:none;
    z-index:1000; /* مهم */
}
#callPopup[style*="display: none"]{
    pointer-events: none;
}
#optionsPopup{
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    background:#222;
    padding:20px;
    border-radius:15px;
    display:none;
    z-index:1000;
    text-align:center;
    box-shadow:0 0 20px rgba(255,255,255,.4);
}

#closeOptions{
    position:absolute;
    top:5px; right:5px;
    border:none; background:#ff416c;
    color:white; border-radius:50%;
    width:30px; height:30px; cursor:pointer;
}

.timer-circle{
    width:120px;
    height:120px;
    border-radius:50%;
    border:8px solid #00ffcc;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    margin:20px auto;
}
/* أزرار النقاط على الجانبين */
.points-left, .points-right{
    display:flex;
    flex-direction:column;
    gap:20px;
    position:absolute;
    top:10px;
}
.points-left{left:-80px;}
.points-right{right:-80px;}
.points-left button, .points-right button{
    width:70px;
    padding:5px;
    font-size:22px;
    border-radius:8px;
    background:linear-gradient(145deg,#00c6ff,#0072ff);
    color:white;
    box-shadow:0 0 5px rgba(0,114,255,.7);
}
.points-left button.used, .points-right button.used{
    background:linear-gradient(145deg,#ff416c,#ff4b2b);
    box-shadow:0 0 5px rgba(255,65,108,.8);
}

/* شاشة السؤال */
#questionScreen{display:none;text-align:center;margin-top:50px;background:#222;border-radius:15px;padding:20px;width:60%;margin:auto;box-shadow:0 0 20px rgba(255,255,255,.3);transition:all .3s}
#answer{margin-top:15px;color:lime;font-size:20px;font-weight:bold;text-shadow:0 0 10px lime}
.answer-buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
    flex-wrap:wrap;
}
.answer-buttons button{
    min-width:120px;
    padding:10px;
    border-radius:12px;
    font-size:14px;
    transition:all .3s;
}
.question-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}

.question-text{
    font-size:24px;
    font-weight:bold;
    color:#fff;
    text-align:center;
    margin-bottom:10px;
}

.question-media{
    max-width:80%;
    max-height:250px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.6);
}
.answer-box{
    margin-top:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.answer-text{
    color:#00ff88;
    font-size:22px;
    font-weight:bold;
    text-shadow:0 0 10px #00ff88;
}

.answer-media{
    max-width:70%;
    max-height:220px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.6);
}

/* للفيديو تحديد حجم */
video.question-media{
    width:400px;
}

/* للصوت */
audio.question-media{
    width:300px;
}
.lifelines{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}

.life{
    font-size:22px;
    cursor:pointer;
    padding:8px;
    border-radius:50%;
    background:linear-gradient(145deg,#00c6ff,#0072ff);
    box-shadow:0 0 8px rgba(0,114,255,.8);
    transition:.3s;
}

.life:hover{
    transform:scale(1.2);
}

.life.used{
    background:gray;
    box-shadow:none;
    cursor:not-allowed;
    opacity:0.6;
}
.btn-current{background:linear-gradient(145deg,#00ffcc,#00c6ff);color:black}
.btn-other{background:linear-gradient(145deg,#f7971e,#ffd200);color:black}
.btn-none{background:linear-gradient(145deg,#8e9eab,#eef2f3);color:black}
.btn-show{background:linear-gradient(145deg,#ff416c,#ff4b2b);color:white}

/* نقاط تظهر عند الإضافة */
#pointsPopup{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:lime;display:none;z-index:999;animation:pop 1s}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}100%{opacity:0}}

/* إعلان الفائز */
#winScreen{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,.9);
    display:none; justify-content:center; align-items:center; flex-direction:column;
    z-index:1000;
}
#winScreen h1{
    font-size:50px;
    color:gold;
    text-shadow:0 0 20px gold;
    margin-bottom:30px;
}

/* نافذة تأكيد الرجوع */
#confirmPopup{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:#222;padding:20px;border-radius:15px;display:none;
    box-shadow:0 0 15px rgba(255,255,255,.4);
}
/* تصميم أزرار 4 خيارات */
.option-btn{
    display:block;
    width:220px;
    padding:12px;
    margin:10px auto;
    border-radius:15px;
    border:none;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    color:white !important;
    box-shadow:0 5px 15px rgba(0,0,0,.5);
    transition:all .3s;
}

.option-btn:hover{
    transform:scale(1.08);
    box-shadow:0 8px 20px rgba(0,0,0,.8);
}

.option-btn:active{
    transform:scale(0.95);
}

/* 🔥 أجبر الألوان */
.opt1{background:linear-gradient(145deg,#ff416c,#ff4b2b) !important;}
.opt2{background:linear-gradient(145deg,#00c6ff,#0072ff) !important;}
.opt3{background:linear-gradient(145deg,#f7971e,#ffd200) !important; color:black !important;}
.opt4{background:linear-gradient(145deg,#43e97b,#38f9d7) !important; color:black !important;}
/* للهواتف فقط */
@media (max-width: 768px) {
    /* تعديل الفئات داخل اللعبة */
    #gameContainer {
        display: flex !important;
        flex-direction: column !important;
        gap: 80px !important;
        padding: 30px !important;
    }
    
    .game-row {
        width: 90% !important;
        margin: 0 auto !important;
        height: auto !important;
        min-height: 280px !important;
    }
    
    .game-row img {
        width: 100% !important;
        height: 180px !important;
    }
    
    .points-left, .points-right {
        position: static !important;
        display: flex !important;
        flex-direction: row !important;
        justify-content: center !important;
        gap: 30px !important;
        margin-top: 15px !important;
    }
    
    .points-left button, .points-right button {
        width: 80px !important;
        font-size: 24px !important;
        padding: 10px !important;
    }
}
/* للهواتف فقط */
@media (max-width: 768px) {
    #gameContainer {
        gap: 80px !important;
    }
}
</style>

    if (timerUsed[currentPlayerIndex]) return; // منع إعادة الاستخدام

    let popup = document.getElementById("timerPopup");
    popup.style.display = "none";

    let time = 45;
    document.getElementById("timer").innerText = time;

    let interval = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = time;
        if(time <= 0){

            popup.style.display = "none";

    },1000);

}

let optionsUsed = [false, false];
const cards=document.querySelectorAll(".card");
cards.forEach(card=>{
card.onclick=()=>{
    if(card.classList.contains("selected")){
        card.classList.remove("selected");
        selectedCategories=selectedCategories.filter(c=>c.name!==card.dataset.name);
        return;
    }

    selectedCategories.push({name:card.dataset.name,img:card.dataset.img});
};
});

function startGame(){
        inQuestion = true;
    // ✅ إعادة تعيين المساعدات
    lifelinesUsed = [
        {double:false, call:false, two:false},
        {double:false, call:false, two:false}
    ];

    timerUsed = [false, false];
    doubleActive = false;
     doubleUsedThisTurn = false;
      optionsUsed = [false, false];
    canUseDouble = true;
    // ✅ إعادة لون الأزرار
    document.querySelectorAll(".life").forEach(btn => {
        btn.classList.remove("used");
    });

    // 🔁 الرجوع للفئات
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("container").style.display = "block";

    container.style.display="none";
    gameScreen.style.display="block";
    scoreboard.style.display="flex";
    updateScoreboard();
    updateTurn();

    gameContainer.innerHTML=""; 
    totalQuestions=0; 
    answered=0;

        usedQuestions[cat.name] = {};

       box.innerHTML=`

    </div>`;

        totalQuestions += 6;
    });

function updateTurn(){document.getElementById("gameTurn").innerText="الدور: "+playerNames[currentPlayerIndex];}

function showQuestion(category,point,btn){
     doubleUsedThisTurn = true; 
    if(btn.classList.contains("used")) return;

    btn.classList.add("used");

    let qList = questions[category][point];

    let q = qList[Math.floor(Math.random()*qList.length)];

    // 👇 حط هذا هنا بعد تعريف q
    currentQuestion = q;

    questionScreen.style.display="block";
    gameScreen.style.display="none";

    questionScreen.innerHTML = `
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="flex: 1; text-align: center;">${q.q}</h2>
        <button onclick="useCallInQuestion()" style="background: linear-gradient(145deg,#00c6ff,#0072ff); color: white; padding: 8px 15px; border-radius: 50px;">📞</button>
    </div>`;

    if(q.img){
        questionScreen.innerHTML += `<img class="question-media" src="${q.img}" style="max-width: 100%; max-height: 300px; margin: 20px auto; display: block; border-radius: 15px;">`;
    }
    if(q.video){
        questionScreen.innerHTML += `<video class="question-media" controls style="max-width: 100%; margin: 20px auto; display: block;"><source src="${q.video}" type="video/mp4"></video>`;
    }
    if(q.audio){
        questionScreen.innerHTML += `<audio class="question-media" controls style="margin: 20px auto; display: block;"><source src="${q.audio}" type="audio/mpeg"></audio>`;
    }

    questionScreen.innerHTML += `
    <div class="answer-buttons">
        <button class="btn-current" onclick="addPoints(${point},true)">${playerNames[currentPlayerIndex]}</button>
        <button class="btn-other" onclick="addPoints(${point},false)">${playerNames[1-currentPlayerIndex]}</button>
        <button class="btn-none" onclick="noOne()">لم يجب أحد</button>
        <button class="btn-show" onclick='showAnswer("${q.a}", ${JSON.stringify(q)})'>إظهار الإجابة</button>
    </div>
    <div id="answer"></div>
`;
}

function startCall(){
    if(lifelinesUsed[currentPlayerIndex].call) {
    alert("لقد استخدمت خاصية الاتصال مسبقًا");
    return;
}
lifelinesUsed[currentPlayerIndex].call = true;
    document.getElementById("callPopup").style.display = "none";

    let popup = document.getElementById("timerPopup");
    popup.style.display = "block";

    let time = 45;
    document.getElementById("timer").innerText = time;

    let interval = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = time;
        if(time <= 0){
            clearInterval(interval);
            popup.style.display = "none";
        }
    },1000);

    window.currentTimer = interval; // لتتمكن من الإيقاف عند الإغلاق
}

function closeTimer(){
    document.getElementById("timerPopup").style.display = "none";
    if(window.currentTimer) clearInterval(window.currentTimer);
    clearInterval(window.currentTimer);
    document.getElementById("timerPopup").style.display = "none";
}

function closeOptions(){
    document.getElementById("optionsPopup").style.display = "none";
}
function noOne(){
    questionScreen.style.display="none";
    gameScreen.style.display="block";
    canUseDouble = true;
    currentPlayerIndex=1-currentPlayerIndex;
     doubleUsedThisTurn = false; 
    updateTurn();
}
function useCall(player, el){
    if(player !== currentPlayerIndex){
        alert("ليس دورك!");
        return;
    }
    if (callUsed[currentPlayerIndex]) return; // إذا استخدمها مسبقاً
    callUsed[currentPlayerIndex] = true;
    document.getElementById("optionsPopup").style.display = "none"; // اخفاء نافذة الاختيار
    if(lifelinesUsed[player].call) return;
    startCall(); // يبدأ العد
    

    lifelinesUsed[player].call = true;
    el.classList.add("used");

    alert("📞 تواصل مع صديقك!");
}
function useTwo(player, el){
    if(player !== currentPlayerIndex){
        alert("ليس دورك!");
        return;
    }

    if(lifelinesUsed[player].two) return;

    lifelinesUsed[player].two = true;
    el.classList.add("used");

    alert("يمكنك إعطاء إجابتين!");
}
function addPoints(point, isCurrent){
    correctSound.play(); // صوت صحيح

    let idx = isCurrent ? currentPlayerIndex : 1 - currentPlayerIndex;

    // حساب النقاط مع الدبل
    let finalPoints = doubleActive ? point * 2 : point;

    playerScores[idx] += finalPoints;

    // إظهار نقاط وسط الشاشة مع تأثير البدل
    showPoints(point, doubleActive);

    doubleActive = false; // إعادة تعيين بعد استخدام الدبل

    answered++;
    updateScoreboard();

    questionScreen.style.display = "none";
    gameScreen.style.display = "block";

    // تغيير الدور
    currentPlayerIndex = 1 - currentPlayerIndex;
    doubleUsedThisTurn = false;
    updateTurn();
    canUseDouble = true;
    checkWinner(); // تحقق من انتهاء اللعبة وإعلان الفائز
}

function showPoints(p, isDouble){
    const pointsPopup = document.getElementById("pointsPopup");
    pointsPopup.innerText = isDouble ? `+${p} (×2)` : `+${p}`;
    pointsPopup.style.display = "block";

    // التأثير البصري
    if(isDouble){
        pointsPopup.style.color = "yellow";
        pointsPopup.style.fontSize = "50px";
        pointsPopup.style.textShadow = "0 0 20px yellow";
    } else {
        pointsPopup.style.color = "lime";
        pointsPopup.style.fontSize = "40px";
        pointsPopup.style.textShadow = "0 0 10px lime";
    }

    // الحركة (تكبير ثم اختفاء)
    pointsPopup.style.transform = "translate(-50%,-50%) scale(0.5)";
    pointsPopup.style.opacity = 0;

    setTimeout(()=>{
        pointsPopup.style.transition = "all 0.5s ease";
        pointsPopup.style.transform = "translate(-50%,-50%) scale(1.2)";
        pointsPopup.style.opacity = 1;
    }, 50);

    setTimeout(()=>{
        pointsPopup.style.transform = "translate(-50%,-50%) scale(1)";
        pointsPopup.style.opacity = 0;
    }, 1000);
}
function showAnswer(a, q){
    document.getElementById("answer").innerHTML = `
    <div class="answer-box">
        <div class="answer-text">${a}</div>

        ${q.imgAnswer ? `<img class="answer-media" src="${q.imgAnswer}">` : ""}

        ${q.videoAnswer ? `
            <video class="answer-media" controls>
                <source src="${q.videoAnswer}" type="video/mp4">
            </video>` : ""}

        ${q.audioAnswer ? `
            <audio class="answer-media" controls>
                <source src="${q.audioAnswer}" type="audio/mpeg">
            </audio>` : ""}
    </div>
    `;
}
function updateScoreboard(){
    player1Score.innerText=playerNames[0]+": "+playerScores[0];
    player2Score.innerText=playerNames[1]+": "+playerScores[1];
}

function checkWinner(){
    inQuestion = false;
    
    // حساب عدد الأسئلة التي تم الإجابة عليها بالفعل
    let answeredCount = 0;
    document.querySelectorAll("#gameContainer .points-left button.used, #gameContainer .points-right button.used").forEach(btn => {
        answeredCount++;
    });
    
    // حساب إجمالي الأسئلة (6 أسئلة لكل فئة)
    let total = selectedCategories.length * 6;
    
    if(answeredCount >= total){
        let winner = playerScores[0] > playerScores[1] ? playerNames[0] :
                     playerScores[0] < playerScores[1] ? playerNames[1] : "تعادل";

        const winScreen = document.getElementById("winScreen");
        const winnerText = document.getElementById("winnerText");

        winnerText.innerText = `🎉 الفائز: ${winner} 🎉`;
        winScreen.style.display = "flex";
    }
}
// تعديل دالة showQuestion للتحقق من العمود
function showQuestionWithCheck(category, point, btn, side) {
    // التحقق من أن اللاعب يضغط على العمود الخاص به
    if(currentPlayerIndex === 0 && side !== 'left') {
        alert(`⚠️ هذه الأسئلة ليست لك! اختر الأسئلة من العمود الأيسر.`);
        return;
    }
    
    if(currentPlayerIndex === 1 && side !== 'right') {
        alert(`⚠️ هذه الأسئلة ليست لك! اختر الأسئلة من العمود الأيمن.`);
        return;
    }
    
    // استدعاء الدالة الأصلية
    originalShowQuestion(category, point, btn);
}

// تخزين الدالة الأصلية
let originalShowQuestion = window.showQuestion;

// استبدال الدالة
window.showQuestion = function(category, point, btn, side) {
    if(side) {
        showQuestionWithCheck(category, point, btn, side);
    } else {
        originalShowQuestion(category, point, btn);
    }
};
    // كشف إذا كان المستخدم يدخل من هاتف
    function isMobile() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }
    
    // دالة لفحص اتجاه الشاشة
    function checkOrientation() {
        if(isMobile() && window.innerHeight > window.innerWidth) {
            showOrientationMessage();
        }
    }
    
    // دالة لإظهار الرسالة
    function showOrientationMessage() {
        let msg = document.createElement("div");
        msg.id = "orientationMsg";
        msg.innerHTML = "🔄 الرجاء وضع الهاتف بالعرض (أفقي) لتجربة ممتازة 🔄";
        msg.style.position = "fixed";
        msg.style.bottom = "20px";
        msg.style.left = "50%";
        msg.style.transform = "translateX(-50%)";
        msg.style.background = "linear-gradient(145deg,#00c6ff,#0072ff)";
        msg.style.color = "white";
        msg.style.padding = "12px 20px";
        msg.style.borderRadius = "25px";
        msg.style.fontSize = "14px";
        msg.style.fontWeight = "bold";
        msg.style.textAlign = "center";
        msg.style.zIndex = "9999";
        msg.style.boxShadow = "0 0 15px rgba(0,0,0,0.3)";
        msg.style.border = "1px solid gold";
        document.body.appendChild(msg);
        
        // إخفاء الرسالة بعد 4 ثواني
        setTimeout(() => {
            if(msg) msg.remove();
        }, 10000);
    }
    
    // مراقبة عند الضغط على زر التالي
    const nextBtn = document.getElementById("nextBtn");
    if(nextBtn) {
        nextBtn.addEventListener("click", function() {
            setTimeout(() => {
                checkOrientation();
            }, 100);
        });
    }
    
    // مراقبة تغيير اتجاه الشاشة
    window.addEventListener("resize", function() {
        if(isMobile() && window.innerHeight > window.innerWidth) {
            let existingMsg = document.getElementById("orientationMsg");
            if(!existingMsg) {
                showOrientationMessage();
            }
        } else {
            let existingMsg = document.getElementById("orientationMsg");
            if(existingMsg) existingMsg.remove();
        }
    });
