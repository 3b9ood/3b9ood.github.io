<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>من نحن</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');

body {
    font-family: 'Cairo', sans-serif;
    margin: 0;
    background: linear-gradient(160deg, #070b14, #0d1526);
    color: #f0f4ff;
    direction: rtl;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle at 20% 20%, rgba(0,229,255,0.08), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,210,80,0.08), transparent 40%);
    z-index: -1;
}

.container {
    max-width: 800px;
    margin: 60px auto;
    padding: 30px;
    background: rgba(17,24,39,0.85);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 30px rgba(0,229,255,0.1);
}

h1 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #ffd24a, #00e5ff);
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    line-height: 1.8;
    color: #cbd5e1;
}

.back-btn, .floating-back {
    position: fixed;
    top: 20px;
    left: 20px;
    background: linear-gradient(135deg, #00e5ff, #0099b8);
    color: black;
    padding: 10px 15px;
    border-radius: 50%;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(0,229,255,0.5);
    transition: 0.3s;
}

.back-btn:hover {
    transform: scale(1.1);
}
</style>

</head>
<body>



<div class="container">

<h1>من نحن</h1>

<p>
موقع "سين جيم الغلابة" هو موقع ترفيهي يقدم ألعاب وأسئلة ممتعة للتحدي بين الأصدقاء.
</p>

<p>
نهدف إلى تقديم تجربة بسيطة وسلسة لجميع المستخدمين، مع محتوى متجدد يغطي مجالات متنوعة مثل الثقافة العامة والترفيه.
</p>

<p>
يمكنك الاستمتاع باللعب مع أصدقائك، اختبار معلوماتك، وقضاء وقت ممتع داخل الموقع.
</p>

</div>

</body>
</html>
